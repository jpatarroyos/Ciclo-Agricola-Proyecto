<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% block title %}Planeacion Agroplan{% endblock %}</title>
    {% load static %}
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">

    {% block navbar %}
    <nav class="bg-[var(--primary)] p-4 text-[var(--secondary)] flex justify-between items-center px-2 md:px-8 w-full">
        <div class="text-lg font-bold">
            <a href="/">Agroplan</a>
        </div>

        <ul class="flex space-x-4 items-center">
            <li>
                {% if user.is_authenticated %}
                    <a href="{% url 'logout' %}" class="hover:underline">Salir</a>
                {% else %}
                    <a href="{% url 'login' %}" class="hover:underline font-bold">Login</a>
                {% endif %}
            </li>
        </ul>
    </nav>
    {% endblock %}


    <div class="container mx-auto p-4 md:p-6 flex-grow">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="bg-[var(--primary)] text-[var(--secondary)] text-center p-4 mt-auto">
        <p>© 2026 Ciclo Agricola - Mi planeador</p>
    </footer>

    {% block scripts %}{% endblock %}

</body>
</html>

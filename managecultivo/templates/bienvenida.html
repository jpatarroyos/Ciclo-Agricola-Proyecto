{% extends "base_dashboard.html" %}
{% load static %}

{% block dashboard_content %}
   
<div class="w-full md:w-3/5 flex flex-col items-center justify-center text-center p-8 md:p-12 bg-white border-b md:border-b-0 md:border-r border-gray-200">
    
    <div class="inline-flex items-center gap-2 px-4 py-1.5 bg-green-50 text-green-700 rounded-full text-sm font-medium mb-6">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        Hoy es {{ fecha_hoy|date:"l j \d\e F \d\e Y" }}
    </div>

    <h2 class="text-3xl md:text-4xl font-extrabold mb-8 text-[var(--primary)] tracking-tight">
        ¡Hola, <span class="text-[var(--focus)]">{{ usuario.username }}</span>! 👋
    </h2>

    <div class="max-w-xs md:max-w-sm w-full transition-transform duration-300 hover:scale-105">
        <img src="{% static 'assets/img/logo.png' %}" alt="Logo AgroPlan" class="w-full h-auto mx-auto object-contain drop-shadow-md">
    </div>

</div>

{% endblock %}

{% extends "base.html" %}
{% load static %}

{% block title %}AgroPlan{% endblock %}

{% block content %}
<div class="text-center max-w-4xl mx-auto px-2">
    
    <img src="{% static 'assets/img/logo.png' %}" alt="Logo CicloAgricola" 
         class="mx-auto w-1/2 md:w-1/3 lg:w-1/5 object-contain">
    
    <h2 class="mt-4 text-xl md:text-2xl font-semibold text-[var(--primary)] italic balance">
        Planificación de ciclos Agrícolas
    </h2>
    
    <img src="{% static 'assets/img/agricola.jpg' %}" alt="Agrícola" 
         class="mx-auto my-6 w-11/12 sm:w-3/4  rounded-lg shadow-md hover:shadow-xl transition-shadow duration-300">

</div>
{% endblock %}

{% extends "base_dashboard.html" %}
{% load grupos %}   <!-- Esto carga tu filtro personalizado -->

{% block dashboard_content %}
<h1 class="text-2xl font-bold mb-6">Cambiar contraseña</h1>

<form method="post" class="space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="flex space-x-4">
        <button type="submit" class="bg-[var(--primary)] hover:bg-[var(--focus)] text-[var(--secondary)] px-2 py-1 rounded">Cambiar</button>
        {% if user|has_group:"Administrador" %}
            <a href="{% url 'bienvenida' %}" class="bg-[var(--cancel)] hover:bg-[var(--cancelFocus)] text-[var(--secondary)] px-2 py-1 rounded">Cancelar</a>
        {% else %}
            <a href="{% url 'home' %}" class="bg-[var(--cancel)] hover:bg-[var(--cancelFocus)] text-[var(--secondary)] px-2 py-1 rounded">Cancelar</a>
        {% endif %}
    </div>
</form>
{% endblock %}
